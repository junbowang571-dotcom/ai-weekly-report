<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 行业资讯日报</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#1e293b;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);
  --cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:rgba(99,102,241,.15);
  --sidebar-w:280px;
  --grad1:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow:hidden;height:100vh}

/* Layout */
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .3s;z-index:200;
}
.sidebar-header{
  padding:1.25rem 1.25rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}
.sidebar-brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.sidebar-brand span{font-size:1.1rem;font-weight:700}
.sidebar-brand .sub{font-size:.7rem;color:var(--text3);font-weight:400;margin-left:.25rem}
.sidebar-search{
  width:100%;padding:.5rem .75rem;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:.85rem;outline:none;
  transition:.2s;font-family:inherit;
}
.sidebar-search:focus{border-color:var(--accent)}
.sidebar-search::placeholder{color:var(--text3)}

/* Date list */
.date-list{flex:1;overflow-y:auto;padding:.75rem}
.date-list::-webkit-scrollbar{width:4px}
.date-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
.date-group{margin-bottom:1rem}
.date-group-label{
  font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.06em;padding:0 .5rem .4rem;
}
.date-item{
  display:flex;align-items:center;gap:.75rem;padding:.65rem .75rem;
  border-radius:10px;cursor:pointer;transition:.2s;position:relative;
  text-decoration:none;color:var(--text);
}
.date-item:hover{background:var(--accent-glow)}
.date-item.active{background:rgba(99,102,241,.12);color:var(--accent2)}
.date-item.active::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;border-radius:2px;background:var(--accent);
}
.date-icon{
  width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:.8rem;flex-shrink:0;
}
.date-icon.latest{background:rgba(99,102,241,.15);color:var(--accent2)}
.date-icon.past{background:var(--surface3);color:var(--text3)}
.date-info .date-title{font-size:.9rem;font-weight:600;line-height:1.3}
.date-info .date-weekday{font-size:.7rem;color:var(--text3)}

/* Content area */
.content{flex:1;height:100vh;position:relative;overflow:hidden}
.content iframe{width:100%;height:100%;border:none;background:var(--bg)}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text3);gap:1rem;
}
.empty-state i{font-size:3rem;opacity:.3}
.empty-state p{font-size:1rem}

/* Mobile toggle */
.mobile-toggle{
  display:none;position:fixed;top:1rem;left:1rem;z-index:300;
  width:40px;height:40px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;
  align-items:center;justify-content:center;font-size:1rem;
}
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;
}

/* Sidebar footer */
.sidebar-footer{
  padding:.75rem 1.25rem;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-footer .total{font-size:.75rem;color:var(--text3)}
.sidebar-footer .live-dot{
  display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--emerald);
}
.sidebar-footer .live-dot::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--emerald);
  animation:pulse-dot 1.5s infinite;
}

/* Loading spinner */
.loading{display:flex;align-items:center;justify-content:center;height:200px}
.spinner{width:40px;height:40px;border:3px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .mobile-toggle{display:flex}
  .content{margin-left:0}
}
</style>
</head>
<body>

<button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="dot"></div>
        <span>AI Daily</span>
        <span class="sub">资讯日报</span>
      </div>
      <input type="text" class="sidebar-search" id="searchInput" placeholder="搜索日期 (如 03-25)...">
    </div>
    <div class="date-list" id="dateList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
    <div class="sidebar-footer">
      <span class="total" id="totalCount">加载中...</span>
      <span class="live-dot">每日更新</span>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="empty-state" id="emptyState">
      <i class="fas fa-satellite-dish"></i>
      <p>选择左侧日期查看 AI 行业资讯</p>
    </div>
  </main>
</div>

<script>
const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];
let allReports = [];
let currentDate = null;

async function init() {
  try {
    const resp = await fetch('manifest.json?t=' + Date.now());
    const data = await resp.json();
    allReports = (data.reports || []).sort().reverse();
  } catch(e) { allReports = []; }

  renderDateList(allReports);
  document.getElementById('totalCount').textContent = allReports.length + ' 期日报';

  if (allReports.length > 0) {
    const hash = window.location.hash.replace('#','');
    loadReport(hash && allReports.includes(hash) ? hash : allReports[0]);
  }
}

function renderDateList(dates) {
  const container = document.getElementById('dateList');
  if (!dates.length) {
    container.innerHTML = '<div class="empty-state" style="height:200px"><i class="fas fa-inbox" style="font-size:1.5rem"></i><p style="font-size:.85rem">暂无日报</p></div>';
    return;
  }
  const groups = {};
  dates.forEach(d => {
    const [y, m] = d.split('-');
    const key = y + '年' + parseInt(m) + '月';
    if (!groups[key]) groups[key] = [];
    groups[key].push(d);
  });

  let html = '';
  let isFirst = true;
  for (const [month, items] of Object.entries(groups)) {
    html += '<div class="date-group"><div class="date-group-label">' + month + '</div>';
    items.forEach(d => {
      const dt = new Date(d + 'T00:00:00');
      const weekday = WEEKDAYS[dt.getDay()];
      const isActive = d === currentDate;
      const isLatest = isFirst;
      isFirst = false;
      html += '<a class="date-item' + (isActive ? ' active' : '') + '" data-date="' + d + '" href="#' + d + '">'
        + '<div class="date-icon ' + (isLatest ? 'latest' : 'past') + '"><i class="fas fa-' + (isLatest ? 'bolt' : 'newspaper') + '"></i></div>'
        + '<div class="date-info"><div class="date-title">' + d.slice(5) + '</div><div class="date-weekday">' + weekday + (isLatest ? ' · 最新' : '') + '</div></div>'
        + '</a>';
    });
    html += '</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.date-item').forEach(el => {
    el.addEventListener('click', function(e) { e.preventDefault(); loadReport(this.dataset.date); });
  });
}

function loadReport(date) {
  currentDate = date;
  window.location.hash = date;
  document.querySelectorAll('.date-item').forEach(el => el.classList.toggle('active', el.dataset.date === date));
  const content = document.getElementById('content');
  const es = document.getElementById('emptyState');
  if (es) es.remove();
  let iframe = content.querySelector('iframe');
  if (!iframe) { iframe = document.createElement('iframe'); content.appendChild(iframe); }
  iframe.src = 'reports/' + date + '.html';
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  renderDateList(q ? allReports.filter(d => d.includes(q)) : allReports);
});
document.getElementById('mobileToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', function() {
  document.getElementById('sidebar').classList.remove('open');
  this.classList.remove('open');
});
window.addEventListener('hashchange', function() {
  const d = window.location.hash.replace('#','');
  if (d && allReports.includes(d) && d !== currentDate) loadReport(d);
});
init();
</script>
</body>
</html>
